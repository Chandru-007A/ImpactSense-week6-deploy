<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPACTSENSE // LOGIN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0c0f;
            color: #00f2ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-container {
            background: rgba(15, 18, 23, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #00f2ff;
            border-radius: 16px;
            padding: 2rem;
            width: 320px;
            box-shadow: 0 0 20px rgba(0,242,255,0.2);
        }
        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.3rem;
        }
        input {
            width: 100%;
            background: #010101cc;
            border: 1px solid #2c3e50;
            color: #00f2ff;
            padding: 0.7rem;
            font-family: monospace;
            border-radius: 8px;
        }
        input:focus {
            outline: none;
            border-color: #ff0055;
        }
        button {
            width: 100%;
            background: none;
            border: 2px solid #00f2ff;
            color: #00f2ff;
            padding: 0.7rem;
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 40px;
            margin-top: 1rem;
        }
        button:hover {
            background: #00f2ff20;
            border-color: #ff0055;
            color: #ff0055;
        }
        .flash {
            text-align: center;
            margin-bottom: 1rem;
            font-size: 0.8rem;
            color: #ff8888;
        }
        .footer {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #3e5a6b;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>⟡ ACCESS TERMINAL ⟡</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash">
                {% for category, message in messages %}
                    <div class="{{ category }}">{{ message }}</div>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="input-group">
<label>EMAIL</label>
                <input type="email" name="email" placeholder="user@example.com" required autofocus>
            </div>
            <div class="input-group">
<label>PASSWORD</label>
                <input type="password" name="password" placeholder="Enter any password" required>
            </div>
            <button type="submit">AUTHENTICATE</button>
        </form>
        <div class="footer">
            [ SYSTEM SECURE ]
        </div>
    </div>
</body>
</html>
